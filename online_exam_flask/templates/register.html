{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create Account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role" onchange="toggleManager(this.value)" required>
            <option value="">Select Role</option>
            <option value="admin">Admin</option>
            <option value="student">Student</option>
        </select>

        <input type="text" name="manager_id" id="manager" placeholder="Manager ID" style="display:none">

        <button type="submit" class="btn">Register</button>
    </form>

    <p style="margin-top:15px;">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </p>

    <script>
        function toggleManager(role) {
            document.getElementById("manager").style.display =
                role === "student" ? "block" : "none";
        }
    </script>
</div>
{% endblock %}
