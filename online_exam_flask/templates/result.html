{% extends "base.html" %}
{% block title %}Result{% endblock %}

{% block content %}
<h2>Exam Results</h2>

<table>
    <tr>
        <th>Exam</th>
        <th>Score</th>
    </tr>
    {% for r in results %}
    <tr>
        <td>{{ r.exam }}</td>
        <td>{{ r.score }}</td>
    </tr>
    {% else %}
    <tr>
        <td colspan="2">No results found</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
